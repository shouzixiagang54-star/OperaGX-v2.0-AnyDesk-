name: Cloud PC via Native Windows RDP Deployment

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 190

    steps:
      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }

      - name: Force Full HD Resolution
        run: Set-DisplayResolution -Width 1920 -Height 1080 -Force

      - name: Download & Force Consumer Build of Opera GX
        run: |
          Invoke-WebRequest -Uri "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx" -OutFile "$env:TEMP\OperaGXSetup.exe"
          Start-Process -FilePath "$env:TEMP\OperaGXSetup.exe" -ArgumentList "--silent=1", "--allusers=1", "--launchbrowser=0" -Wait

      - name: Configure Native Windows Remote Desktop (RDP)
        run: |
          Write-Host "Enabling Remote Desktop via Registry..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          
          Write-Host "Configuring Windows Defender Firewall Rules..."
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          Write-Host "Enabling and starting Terminal Services..."
          Set-Service -Name "TermService" -StartupType Automatic
          Start-Service -Name "TermService" -ErrorAction SilentlyContinue

      - name: Set RDP Access Credentials
        run: |
          Write-Host "Configuring administrative user account credentials..."
          # Changes the runneradmin password to a defined secure string you can use to login
          $Password = ConvertTo-SecureString "CloudPC_SecurePass2026!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password
          
          Write-Host "Ensuring user belongs to Remote Desktop Users cluster..."
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin" -ErrorAction SilentlyContinue

      - name: Fetch Public Deployment Network Address
        run: |
          Write-Host "Retrieving public WAN routing matrix..."
          # Uses ngrok/pagekite alternatives or dynamic DNS if needed, or logs the runner IP
          $publicIP = Invoke-RestMethod -Uri "https://api.ipify.org"
          Write-Host "===================================================="
          Write-Host "TARGET RDP ADDRESS: $publicIP"
          Write-Host "USERNAME: runneradmin"
          Write-Host "PASSWORD: CloudPC_SecurePass2026!"
          Write-Host "===================================================="

      - name: Keep alive
        run: |
          $end = (Get-Date).AddMinutes(180)
          while ((Get-Date) -lt $end) {
            Write-Host ("RDP Connection Active | Heartbeat " + (Get-Date).ToString("HH:mm:ss") + " ends at " + $end.ToString("HH:mm:ss"))
            Start-Sleep -Seconds 60
          }
