name: Cloud PC + Hidden Gem Supremo Connection

on:
  workflow_dispatch:
    inputs:
      runtime_minutes:
        description: "Runtime in minutes"
        required: false
        default: "355"

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  desktop:
    runs-on: windows-latest
    timeout-minutes: 370
    steps:
      - name: Optimize System and Disable Firewall
        run: |
          Set-NetFirewallProfile -Profile Public,Private,Domain -Enabled False
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Start-Service -Name "TermService" -ErrorAction SilentlyContinue

      - name: Download Portable Supremo Engine
        run: |
          Write-Host "Fetching independent routing host executable..."
          $url = "https://www.supremocontrol.com/download/supremo/windows/"
          $exePath = "$env:TEMP\Supremo.exe"
          
          # Emulate regular browser request to grab the standalone file cleanly
          $headers = @{"User-Agent" = "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"}
          Invoke-WebRequest -Uri $url -Headers $headers -OutFile $exePath
          Write-Host "✅ Standalone Supremo file pulled successfully."

      - name: Initialize Background Hosting Profiles
        run: |
          $exePath = "$env:TEMP\Supremo.exe"
          
          Write-Host "Registering persistent access credentials..."
          # Configures an immediate background password without an install sequence
          Start-Process $exePath -ArgumentList "/install", "/unattended", "/password=Pass5678" -NoNewWindow
          Start-Sleep -Seconds 15

      - name: Parse Active Routing Address
        run: |
          Write-Host "Extracting generated system ID..."
          
          # Supremo logs session identification directly into a local log file upon server handshakes
          $logPath = "$env:ProgramData\SupremoRemoteDesktop\Supremo.log"
          if (-not (Test-Path $logPath)) { $logPath = "$env:AppData\SupremoRemoteDesktop\Supremo.log" }
          
          # Give it a tiny window to establish a handshake with the routing servers
          for ($i = 1; $i -le 6; $i++) {
              if (Test-Path $logPath) {
                  $logContent = Get-Content $logPath -Raw
                  # Regex to parse out the unique 9-digit Supremo Address ID
                  if ($logContent -match 'Your ID:\s*(\d{3}\s*\d{3}\s*\d{3})' -or $logContent -match 'ID:\s*(\d{9})') {
                      $supremoID = $matches[1] -replace '\s+', ''
                      
                      $Esc = [char]27
                      Write-Host "`n${Esc}[36m###########################################################################${Esc}[0m"
                      Write-Host "${Esc}[33m🚨 UNDER-THE-RADAR SUPREMO SERVER LIVE 🚨${Esc}[0m"
                      Write-Host "${Esc}[36m###########################################################################${Esc}[0m"
                      Write-Host "${Esc}[32m🆔 SUPREMO ID / ADDRESS: $supremoID${Esc}[0m"
                      Write-Host "${Esc}[32m🔑 PASSCODE: Pass5678${Esc}[0m"
                      Write-Host "${Esc}[36m###########################################################################${Esc}[0m`n"
                      break
                  }
              }
              Write-Host "Waiting for network synchronization token ($i/6)..."
              Start-Sleep -Seconds 5
          }

      - name: Session Keep Alive Loop
        run: |
          $mins = [int]"${{ inputs.runtime_minutes }}"
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host "Supremo Data Stream Active | Heartbeat Signal Live"
            Start-Sleep -Seconds 60
          }
